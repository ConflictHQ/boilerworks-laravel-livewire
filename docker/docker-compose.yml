services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: boilerworks-livewire
    volumes:
      - ..:/app
      - composer_cache:/root/.composer
    environment:
      - APP_NAME=Boilerworks
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8089
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=boilerworks
      - DB_USERNAME=boilerworks
      - DB_PASSWORD=boilerworks
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - FILESYSTEM_DISK=s3
      - AWS_ACCESS_KEY_ID=boilerworks
      - AWS_SECRET_ACCESS_KEY=boilerworks
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=boilerworks
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true
      - FEATURE_FORMS=true
      - FEATURE_WORKFLOWS=true
      - FEATURE_SEARCH=false
      - FEATURE_HORIZON=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: boilerworks-livewire-nginx
    ports:
      - "8089:80"
    volumes:
      - ..:/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: boilerworks-livewire-db
    ports:
      - "5449:5432"
    environment:
      - POSTGRES_USER=boilerworks
      - POSTGRES_PASSWORD=boilerworks
      - POSTGRES_DB=boilerworks
    volumes:
      - livewire_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boilerworks -d boilerworks"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: boilerworks-livewire-redis
    ports:
      - "6391:6379"
    volumes:
      - livewire_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: boilerworks-livewire-worker
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ..:/app
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=boilerworks
      - DB_USERNAME=boilerworks
      - DB_PASSWORD=boilerworks
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: boilerworks-livewire-minio
    ports:
      - "9004:9000"
      - "9005:9001"
    environment:
      - MINIO_ROOT_USER=boilerworks
      - MINIO_ROOT_PASSWORD=boilerworks
    volumes:
      - livewire_minio:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: boilerworks-livewire-mailpit
    ports:
      - "8027:8025"
      - "1027:1025"
    restart: unless-stopped

volumes:
  livewire_db:
  livewire_redis:
  livewire_minio:
  composer_cache:
